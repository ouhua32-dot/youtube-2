<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Video Counter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #222230;
    --accent: #00e5ff; --accent2: #ff4081; --text: #e0e0f0; --muted: #555570;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.05) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(255,64,129,0.05) 0%, transparent 50%);
  }
  .container { max-width: 560px; width: 100%; }
  header { margin-bottom: 32px; border-left: 3px solid var(--accent); padding-left: 18px; }
  header .label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  header h1 { font-size: 24px; font-weight: 700; color: #fff; }
  header p { margin-top: 6px; font-size: 12px; color: var(--muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  input, select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px;
    padding: 12px 16px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,229,255,0.08); }
  select option { background: #111; }
  .custom-date { display: none; gap: 12px; }
  .custom-date.visible { display: grid; grid-template-columns: 1fr 1fr; }
  .custom-date .sub { display: flex; flex-direction: column; gap: 6px; }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 8px;
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    background: var(--accent); color: #000; text-transform: uppercase; margin-top: 6px;
  }
  .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
  .result-box { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; margin-top: 16px; }
  .result-box.visible { display: block; }
  .result-box .big-num { font-family: 'Space Mono', monospace; font-size: 56px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 10px; }
  .result-box .desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .result-box .meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 14px; line-height: 2; text-align: left; }
  .status { font-family: 'Space Mono', monospace; font-size: 12px; padding: 12px 16px; border-radius: 8px; margin-top: 14px; display: none; }
  .status.loading { display: flex; align-items: center; gap: 10px; background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.2); color: var(--accent); }
  .status.error { display: block; background: rgba(255,64,129,0.06); border: 1px solid rgba(255,64,129,0.2); color: var(--accent2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
  .tag { display: inline-block; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); color: var(--accent); font-family: 'Space Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; margin-right: 4px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">YouTube Counter</div>
    <h1>Video Card Counter</h1>
    <p>Paginated real count (not estimated) · relevanceLanguage=ja</p>
  </header>
  <div class="card">
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSy..." />
    </div>
    <div class="form-group">
      <label>Search Query</label>
      <input type="text" id="query" value="bambu lab 3d&#12503;&#12522;&#12531;&#12479;&#12540;" />
    </div>
    <div class="form-group">
      <label>Time Range</label>
      <select id="timeRange" onchange="toggleCustom()">
        <option value="">All time</option>
        <option value="week">Last 1 week</option>
        <option value="month">Last 1 month</option>
        <option value="3month">Last 3 months</option>
        <option value="6month">Last 6 months</option>
        <option value="year">Last 1 year</option>
        <option value="2year">Last 2 years</option>
        <option value="3year">Last 3 years</option>
        <option value="custom">Custom range...</option>
      </select>
    </div>
    <div class="custom-date" id="customDate">
      <div class="sub">
        <label>Start date</label>
        <input type="date" id="customAfter" />
      </div>
      <div class="sub">
        <label>End date</label>
        <input type="date" id="customBefore" />
      </div>
    </div>
    <button class="btn" id="runBtn" onclick="run()">Start Count</button>
    <div class="status" id="status"><div class="dot"></div><span id="statusText">Counting...</span></div>
    <div class="result-box" id="resultBox">
      <div class="big-num" id="resultNum">0</div>
      <div class="desc">Actual video cards found</div>
      <div class="meta" id="resultMeta"></div>
    </div>
  </div>
</div>
<script>
function toggleCustom() {
  const v = document.getElementById('timeRange').value;
  const el = document.getElementById('customDate');
  el.classList.toggle('visible', v === 'custom');
}

function getTimeRange() {
  const key = document.getElementById('timeRange').value;
  const now = new Date();
  if (key === 'custom') {
    const a = document.getElementById('customAfter').value;
    const b = document.getElementById('customBefore').value;
    return {
      after: a ? new Date(a).toISOString() : '',
      before: b ? new Date(b + 'T23:59:59').toISOString() : ''
    };
  }
  if (!key) return { after: '', before: '' };
  const after = new Date(now);
  if (key === 'week') after.setDate(now.getDate() - 7);
  else if (key === 'month') after.setMonth(now.getMonth() - 1);
  else if (key === '3month') after.setMonth(now.getMonth() - 3);
  else if (key === '6month') after.setMonth(now.getMonth() - 6);
  else if (key === 'year') after.setFullYear(now.getFullYear() - 1);
  else if (key === '2year') after.setFullYear(now.getFullYear() - 2);
  else if (key === '3year') after.setFullYear(now.getFullYear() - 3);
  return { after: after.toISOString(), before: now.toISOString() };
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.className = 'status loading';
  document.getElementById('statusText').textContent = msg;
}
function showError(msg) {
  const el = document.getElementById('status');
  el.className = 'status error';
  el.innerHTML = '&#10060; ' + msg;
}
function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

async function run() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const query = document.getElementById('query').value.trim();
  if (!apiKey || !query) { showError('Please fill in API Key and query'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('resultBox').classList.remove('visible');

  const { after, before } = getTimeRange();
  const timeKey = document.getElementById('timeRange').value;

  let total = 0, pageToken = '', page = 1;
  try {
    do {
      showStatus('Fetching page ' + page + '... (' + total + ' found so far)');
      let url = 'https://www.googleapis.com/youtube/v3/search?part=snippet'
        + '&q=' + encodeURIComponent(query)
        + '&type=video&maxResults=50&relevanceLanguage=ja';
      if (after) url += '&publishedAfter=' + after;
      if (before) url += '&publishedBefore=' + before;
      if (pageToken) url += '&pageToken=' + pageToken;
      url += '&key=' + apiKey;

      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      total += (data.items || []).length;
      pageToken = data.nextPageToken || '';
      page++;
      if (pageToken) await new Promise(r => setTimeout(r, 300));
    } while (pageToken);

    hideStatus();
    document.getElementById('resultNum').textContent = total.toLocaleString();

    const timeLabels = {
      '': 'All time', 'week': 'Last 1 week', 'month': 'Last 1 month',
      '3month': 'Last 3 months', '6month': 'Last 6 months',
      'year': 'Last 1 year', '2year': 'Last 2 years', '3year': 'Last 3 years',
    };
    let timeLabel = timeKey === 'custom'
      ? (document.getElementById('customAfter').value || '...') + ' ~ ' + (document.getElementById('customBefore').value || '...')
      : (timeLabels[timeKey] || 'All time');

    document.getElementById('resultMeta').innerHTML =
      '<span class="tag">Query</span> ' + query + '<br>' +
      '<span class="tag">Time</span> ' + timeLabel + '<br>' +
      '<span class="tag">Language</span> relevanceLanguage=ja<br>' +
      '<span class="tag">Pages</span> ' + (page - 1) + ' pages x 50 max';

    document.getElementById('resultBox').classList.add('visible');
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
